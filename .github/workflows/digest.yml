name: AIxUX Digest to Feishu

on:
  schedule:
    # 选项 1: UTC 23:00 = 北京时间 07:00（早餐时间）
    # - cron: '0 23 * * *'
    
    # 选项 2: UTC 22:00 = 北京时间 06:00（起床时间）
    # - cron: '0 22 * * *'
    
    # 选项 3: UTC 00:30 = 北京时间 08:30（上班前）
    # - cron: '30 0 * * *'
    
    # 当前选择: UTC 23:00 = 北京时间 07:00
    # 避开 UTC 00:00-02:00 高峰时段
    - cron: '0 23 * * *'
  
  workflow_dispatch:  # 允许手动触发

jobs:
  digest:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
      
      - name: Run digest bot
        env:
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          FEISHU_SECRET: ${{ secrets.FEISHU_SECRET }}
          FEISHU_KEYWORD: ${{ secrets.FEISHU_KEYWORD }}
          SOURCES_JSON: ${{ secrets.SOURCES_JSON }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
          CLAUDE_BASE_URL: ${{ secrets.CLAUDE_BASE_URL }}
        run: |
          python -m bot.run
      
      - name: Commit updated state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state/seen.json
          git diff --staged --quiet || git commit -m "chore: update seen.json [skip ci]"
          git push
